<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Letter Table Sequence Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .button-group { margin-bottom: 20px; }
    .button-group button {
      font-size: 18px; 
      padding: 8px 16px;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .sortable-container {
      display: flex;
      gap: 30px;
    }
    .sortable-item {
      background: #f9f9f9;
      border: 2px solid #bbb;
      border-radius: 7px;
      padding: 12px;
      width: 190px;
      transition: box-shadow .2s;
      box-shadow: 0 0 2px #999;
      cursor: grab;
      position: relative;
    }
    .sortable-item.drag-over {
      border-color: #2196f3;
      box-shadow: 0 0 4px #2196f3;
    }
    table { margin-bottom: 12px; border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #888; padding: 6px 8px; text-align: center; }
    .output { margin-top: 30px; font-size: 22px; font-weight: bold; }
    .table-title { text-align: center; font-weight: bold; margin-bottom: 2px; }
    .rotate-btns { display: flex; gap: 6px; justify-content: center; margin-bottom: 7px; }
    .rotate-btns button { padding: 2px 10px; font-size: 17px; }
  </style>
</head>
<body>
  <h2>Letter Table Sequence Calculator</h2>
  
  <!-- 1) Letter Buttons -->
  <div class="button-group">
    <button data-index="0">A</button>
    <button data-index="1">H</button>
    <button data-index="2">I</button>
    <button data-index="3">L</button>
    <button data-index="4">Q</button>
    <button data-index="5">U</button>
    <button data-index="6">W</button>
    <button data-index="7">Z</button>
  </div>

  <!-- 2) Sortable/Draggable Tables -->
  <div class="sortable-container" id="sortable-container">
    <div class="sortable-item" data-table="1" draggable="true" id="table1-panel">
      <div class="table-title">Table 1</div>
      <div class="rotate-btns">
        <button id="table1-up">&#9650; Up</button>
        <button id="table1-down">&#9660; Down</button>
      </div>
      <table>
        <thead>
          <tr><th>Index</th><th>Value</th></tr>
        </thead>
        <tbody id="tab1"></tbody>
      </table>
    </div>
    <div class="sortable-item" data-table="2" draggable="true" id="table2-panel">
      <div class="table-title">Table 2</div>
      <div class="rotate-btns">
        <button id="table2-up">&#9650; Up</button>
        <button id="table2-down">&#9660; Down</button>
      </div>
      <table>
        <thead>
          <tr><th>Index</th><th>Value</th></tr>
        </thead>
        <tbody id="tab2"></tbody>
      </table>
    </div>
    <!-- Third (Fixed) Table -->
    <div class="sortable-item" style="background:#eee; cursor:default; border:2px solid #999;" data-table="3" id="table3-panel">
    <div class="table-title">Table 3 (Fixed)</div>
    <table>
        <thead>
        <tr><th>Index</th><th>Value</th></tr>
        </thead>
        <tbody id="tab3"></tbody>
    </table>
    </div>
  </div>


  <!-- 3) Output -->
  <div class="output">Output Letter: <span id="result">-</span></div>

  <script>
    // --- DATA ---
    const letters = ['A','H','I','L','Q','U','W','Z'];
    const table1Init = [7, 1, 2, -3, 2, 0, -5, -4];
    const table2Init = [1, 2, 4, -3, -2, -1, 1, -2];
    const table3Init = [1,-1,1,-1,3,1,-1,-3]

    let table1 = table1Init.slice();
    let table2 = table2Init.slice();
    let table3 = table3Init.slice();
    let table1RotateCount = 0; // For rotation logic

    // Order of calculation: which table is first ("1" or "2")
    let tableOrder = ['1', '2']; // Default: Table 1 first, Table 2 second

    // --- TABLE DISPLAY ---
    function fillTable(tabId, arr) {
    let table = '';
    for(let i=0; i<8; i++){
        let val = arr[i]>=0 ? `+${arr[i]}` : arr[i];
        let sum = ((i+1) + arr[i]) % 8;
        if (sum <=0) sum +=8;
        table += `<tr><td>${i+1}</td><td>${val}</td><td>${sum}</td></tr>`;
    }
    document.getElementById(tabId).innerHTML = table;
    }
    fillTable('tab1', table1);
    fillTable('tab2', table2);
    // Fill Table 3 with eight "+1"
    fillTable('tab3', table3);

    // --- ROTATE BUTTONS ---
    function rotateArrayUp(arr) { arr.unshift(arr.pop()); }
    function rotateArrayDown(arr) { arr.push(arr.shift()); }

    document.getElementById('table1-up').onclick = () => { rotateArrayDown(table1); fillTable('tab1', table1); table1RotateCount = 0;};
    document.getElementById('table1-down').onclick = () => { rotateArrayUp(table1); fillTable('tab1', table1); table1RotateCount = 0;};
    document.getElementById('table2-up').onclick = () => { rotateArrayDown(table2); fillTable('tab2', table2); table1RotateCount = 0;};
    document.getElementById('table2-down').onclick = () => { rotateArrayUp(table2); fillTable('tab2', table2); table1RotateCount = 0;};

    // --- DRAG N PLACE LOGIC ---
    let draggedItem = null;
    document.querySelectorAll('.sortable-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        draggedItem = item;
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over');
      });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if(draggedItem && draggedItem !== item){
          const container = document.getElementById("sortable-container");
          let children = Array.from(container.children);
          let draggedIndex = children.indexOf(draggedItem);
          let dropIndex = children.indexOf(item);
          if(draggedIndex > dropIndex){
            container.insertBefore(draggedItem, item);
          }else{
            container.insertBefore(draggedItem, item.nextSibling);
          }
          // Update calculation order based on new arrangement
          tableOrder = [];
          Array.from(container.children).forEach(child => {
            tableOrder.push(child.getAttribute("data-table"));
          });
        }
        draggedItem = null;
      });
      item.addEventListener('dragend', () => {
        draggedItem = null;
      });
    });

    // --- CALCULATION LOGIC ---
    document.querySelectorAll('.button-group button').forEach(btn => {
      btn.addEventListener('click', function() {
        // Decide which is first table and second table in calculation
        let A, B;
        if (tableOrder[0] === '1') {
          A = table1; B = table2;
        } else {
          A = table2; B = table1;
        }
        let reflector=table3;
        const idx = parseInt(btn.getAttribute('data-index')); // 0-based
        
        // Calculation logic: using A and B
        let sum1 = (idx+1) + A[idx];
        let idx1 = sum1 % 8;
        if (idx1 <=0) idx1 +=8;

        let sum2 = idx1 + B[idx1-1];
        let idx2 = sum2 % 8;
        if(idx2 <= 0) idx2 += 8;
        
        let sumr = idx2 + reflector[idx2-1]; // table3 the reflector;
        let idxr = sumr % 8;
        if(idxr <= 0) idxr += 8;

        //get the sum of index + value for table 2
        let reverse2 = table2.map((v, i) => (i+1) + v);
        let idx2r = reverse2.indexOf(idxr)

        let reverse1 = table1.map((v, i) => (i+1) + v);
        let idx1r = reverse1.indexOf(idx2r+1)
        
        let finalIndex = idx1r;
        
        document.getElementById('result').textContent = letters[finalIndex];

        // Rotation logic after calculation, only for original table1/table2
        table1RotateCount++;
        // Only rotate the original table1
        rotateArrayUp(table1);
        fillTable('tab1', table1);
        // After 8 steps of original table1, rotate original table2
        if (table1RotateCount >= 8) {
          rotateArrayUp(table2);
          fillTable('tab2', table2);
          table1RotateCount = 0;
        }
      });
    });

  </script>
</body>
</html>
