<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>莫里安星渊</title>
  <style>
    html, body {
      height: 100%;
      padding: 0;
      margin: 0;
    }
    body {
      background: #000;
      color: #e0e0e0;
      min-height: 100vh;
      min-width: 100vw;
      font-family: "微软雅黑", Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .title {
      font-size: 2.3em;
      margin-bottom: 0.7em;
      text-align: center;
      font-weight: bold;
    }
    .sentence {
      font-size: 1.3em;
      text-align: center;
      color: #aaa;
      margin-bottom: 2em;
    }
    .sentence .italic {
      font-style: italic;
      color: #aaa;
    }
    .imgbox {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }
    .imgbox img {
      max-width: 350px;
      width: 90vw;
      display: block;
      filter: drop-shadow(0 0 32px #222);
    }
  </style>
</head>
<body>
  <div class="title">你发现了莫里安星渊的所在……</div>
  <div class="sentence">但<span class="italic">这里</span>什么都没有。</div>
</body>
</html>
